<button class="chat-trigger-btn" (click)="basculerChat()">
  <span>{{ estOuvert ? '' : '💬' }}</span>
</button>

<div class="chat-window" *ngIf="estOuvert">
  <div class="chat-header">
    <h3>Conseiller Cinéma IA</h3>
    <small>Propulsé par Gemini</small>
  </div>

  <div class="chat-messages">
    <div *ngFor="let msg of historiqueMessages" 
         [class]="'message-bubble ' + (msg.expediteur === 'user' ? 'user' : 'ia')">
      <p>{{ msg.texte }}</p>
      <span class="message-date">{{ msg.date | date:'HH:mm' }}</span>
    </div>

    <div *ngIf="estEnTrainDeCharger" class="message-bubble ia chargement">
      <p>L'IA réfléchit...</p>
    </div>
  </div>

  <div class="chat-input-area">
    <input type="text" 
           [(ngModel)]="messageSaisi" 
           (keyup.enter)="envoyer()" 
           placeholder="Demandez un film..." />
    <button (click)="envoyer()" [disabled]="!messageSaisi.trim() || estEnTrainDeCharger">
      Envoyer
    </button>
  </div>
</div>
